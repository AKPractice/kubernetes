apiVersion: v1
kind: Pod
metadata:
  name: multi-conntainer-pod
  labels:
    env: Test
  annotations:
    purpose: "checking multi conntainer pod"
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
      requests:
        memory: "64Mi"
        cpu: "0.25m"
      limits:
        memory: "128Mi"
        cpu: "0.25m"
    # env:
    # - name : "COURSE"
    #   value: "Kubernetes"
    # - name: "TIME"
    #   value: "1Week"
    envFrom:
    - secretRef:
      name: secret.yaml

  - name: almalinux
    image: almalinux:9
    command: ["sleep", '1000']
    resources:
      requests:
        memory: "28Mi"
        cpu: "0.25m"
      limits:
        memory: "32Mi"
        cpu: "0.25m"
    env:
    - name: "OS_NAME"
      value: "LINUX-9"
    - name: "IS_OS_RUNNING"
      value: "YES"