apiVersion: apps/v1
kind: service
metadata:
  name: lb-service
  labels:
    purpose: lb-demo
spec:
  type: LoadBalancer
  selector:
    purpose: lb-demo
    project: MyProject
    env: dev
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: pod-lb
  labels:
    purpose: lb-demo
    project: MyProject
    env: dev
spec:
  containers:
  - name: lb-pod-nginx
    image: nginx
