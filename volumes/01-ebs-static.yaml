apiVersion: v1
kind: PersistentVolume
metadata: 
  name: ebs-static
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 20Gi
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-059e6b4516d2412cf
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
spec:
  storageClassName: ""
  volumeName: ebs-static
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi
---

apiVersion: v1
kind: Pod
metadata: 
  name: ebs-static-Pod
  labels:
    project: roboshop
    purpose: ebs-static-demo
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1a
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: persistent-storage
      mountPath: /usr/share/nginx/html
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-static

---

apiVersion: v1
kind: Service
metadata:
  name: ebs-static
  labels:
    project: roboshop
    purpose: ebs-static-demo
spec:
  type: LoadBalancer
  selector:
    project: roboshop
    purpose: ebs-static-demo
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80