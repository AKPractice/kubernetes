apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
  labels:
    purpose: deplyment-demo
    project: My-deployment
    env: dev
spec:
  replicas: 15
  selector:
    matchLabels:
      purpose: deployment-demo
      project: my-deployment
      env: dev
  template:
    metadata:
      labels:
        purpose: deployment-demo
        project: my-deployment
        env: dev
    spec:
      containers:
      - name: nginx
        image: nginx
    


